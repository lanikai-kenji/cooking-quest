<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="0.5" stop-color="#ff2e63"/>
      <stop offset="1" stop-color="#8a1e5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffd23f" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ffd23f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff5a1f"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#fff3b0"/>
    </linearGradient>
    <linearGradient id="pan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f52"/>
      <stop offset="1" stop-color="#12141d"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#glow)"/>

  <!-- フライパン -->
  <g>
    <!-- 取っ手 -->
    <rect x="356" y="352" width="150" height="34" rx="17" transform="rotate(18 356 352)" fill="url(#pan)"/>
    <!-- 本体 -->
    <ellipse cx="214" cy="372" rx="150" ry="60" fill="url(#pan)"/>
    <ellipse cx="214" cy="360" rx="150" ry="58" fill="#0d0f17"/>
    <ellipse cx="214" cy="356" rx="128" ry="46" fill="#191c28"/>
  </g>

  <!-- 炎（外） -->
  <path fill="url(#flameOuter)" d="
    M232 350
    C120 320 150 220 205 168
    C214 232 250 214 236 150
    C300 176 336 250 316 316
    C356 300 356 250 340 224
    C392 268 404 356 336 396
    C300 418 250 414 232 350 Z"/>
  <!-- 炎（内） -->
  <path fill="url(#flameInner)" d="
    M244 352
    C196 336 206 274 244 236
    C246 288 276 276 270 232
    C310 262 320 314 300 350
    C300 384 272 396 244 352 Z"/>

  <!-- きらめき -->
  <circle cx="372" cy="150" r="12" fill="#fff3b0"/>
  <circle cx="410" cy="196" r="7" fill="#ffe27a"/>
  <circle cx="120" cy="150" r="8" fill="#ffd23f"/>
</svg>
